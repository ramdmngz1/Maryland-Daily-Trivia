name = "maryland-trivia-contest"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database binding (default / production)
[[d1_databases]]
binding = "DB"
database_name = "maryland-trivia-contest"
database_id = "f3586d22-5426-4ada-bdec-5d245b63d34f"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Production environment
[env.production]
name = "maryland-trivia-contest"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "maryland-trivia-contest"
database_id = "f3586d22-5426-4ada-bdec-5d245b63d34f"

# Staging environment
[env.staging]
name = "maryland-trivia-contest-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
